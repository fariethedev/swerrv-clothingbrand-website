spring.application.name=swerrv

# ============================================================
# Database Configuration (from environment variables)
# ============================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/${DB_NAME:swerrv}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:swerrv_secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:4000,http://172.20.10.3:5173,https://www.swerrv.shop,https://swerrv.shop,https://swerrv-clothingbrand-website-production.up.railway.app

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Multipart and request size limits
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB

# ============================================================
# Stripe
# ============================================================
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# ============================================================
# Google Auth
# ============================================================
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
